version: "3.8"

services:
  etcd:
    image: bitnami/etcd:3.5
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: litellm
      MARIADB_USER: litellm
      MARIADB_PASSWORD: litellm
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm-proxy:
    build: .
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: litellm
      DB_PASSWORD: litellm
      DB_NAME: litellm
    env_file:
      - path: .env
        required: false
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  apisix:
    image: apache/apisix:3.10.0-debian
    depends_on:
      etcd:
        condition: service_healthy
      litellm-proxy:
        condition: service_started
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    ports:
      - "9080:9080"
      - "9180:9180"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9080/apisix/status"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mariadb-data:
